name: AA-Sportzx

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes (UTC = also every 30 min SGT)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome

      - name: Run Sportzx Scraper
        run: |
          python Sportzx.py

      - name: Commit and push updated M3U8 file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Sportzx.m3u8
          git diff --cached --quiet || git commit -m "Aggiornato file M3U8 con nuovi flussi"
          git push
